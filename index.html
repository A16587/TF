<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سر المنام </title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/fontsource-cairo@latest/index.css" rel="stylesheet">
<style>
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    scrollbar-width: thin;
    scrollbar-color: rgba(255, 215, 0, 0.3) transparent;
}
*::-webkit-scrollbar { 
    width: 6px;
    height: 6px;
}
*::-webkit-scrollbar-track { 
    background: transparent;
}
*::-webkit-scrollbar-thumb { 
    background: rgba(255, 215, 0, 0.3);
    border-radius: 10px;
}
*::-webkit-scrollbar-thumb:hover { 
    background: rgba(255, 215, 0, 0.5);
}
html, body {
    height: 100%;
    overflow: hidden;
}
body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0a0f20 0%, #141b33 50%, #0d1428 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    position: relative;
}
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 170, 51, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(100, 150, 255, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
}
.main-container {
    display: flex;
    height: 100vh;
    width: 100%;
    position: relative;
    z-index: 1;
}
.sidebar {
    width: 400px;
    background: linear-gradient(180deg, rgba(15, 20, 35, 0.98) 0%, rgba(10, 15, 30, 0.98) 100%);
    border-left: 1px solid rgba(255, 215, 0, 0.2);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    z-index: 300;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    transform: translateX(100%);
    box-shadow: -15px 0 50px rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(20px);
}
.sidebar.open {
    transform: translateX(0);
}
.sidebar-header {
    padding: 25px;
    border-bottom: 1px solid rgba(255, 215, 0, 0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.08) 0%, transparent 100%);
}
.sidebar-header h2 {
    font-size: 22px;
    color: #ffd700;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
}
.close-sidebar {
    background: none;
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    padding: 8px;
    transition: all 0.3s;
    border-radius: 10px;
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.close-sidebar:hover {
    color: #ffd700;
    background: rgba(255, 215, 0, 0.1);
    transform: rotate(90deg);
}
.sidebar-actions {
    padding: 20px 25px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    border-bottom: 1px solid rgba(255, 215, 0, 0.15);
    background: rgba(255, 255, 255, 0.02);
}
.sidebar-btn {
    padding: 15px 20px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
}
.sidebar-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    transition: left 0.5s;
}
.sidebar-btn:hover::before {
    left: 100%;
}
.btn-profile {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 215, 0, 0.05) 100%);
    color: #ffd700;
    border: 1px solid rgba(255, 215, 0, 0.4);
}
.btn-profile:hover {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.25) 0%, rgba(255, 215, 0, 0.1) 100%);
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(255, 215, 0, 0.2);
}
.btn-new {
    background: linear-gradient(135deg, #ffd700 0%, #ffaa33 100%);
    color: #0a0f20;
}
.btn-new:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
}
.btn-delete-all {
    background: linear-gradient(135deg, rgba(255, 80, 80, 0.15) 0%, rgba(255, 80, 80, 0.05) 100%);
    color: #ff5050;
    border: 1px solid rgba(255, 80, 80, 0.3);
}
.btn-delete-all:hover {
    background: linear-gradient(135deg, rgba(255, 80, 80, 0.25) 0%, rgba(255, 80, 80, 0.1) 100%);
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(255, 80, 80, 0.2);
}
.chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}
.chat-item {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.3s;
    border: 1px solid rgba(255, 215, 0, 0.1);
    position: relative;
    overflow: hidden;
}
.chat-item::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(180deg, #ffd700, #ffaa33);
    opacity: 0;
    transition: opacity 0.3s;
}
.chat-item:hover {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 215, 0, 0.05) 100%);
    border-color: rgba(255, 215, 0, 0.3);
    transform: translateX(-8px);
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
}
.chat-item:hover::before {
    opacity: 1;
}
.chat-item.active {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.18) 0%, rgba(255, 215, 0, 0.08) 100%);
    border-color: #ffd700;
    box-shadow: 0 5px 25px rgba(255, 215, 0, 0.15);
}
.chat-item.active::before {
    opacity: 1;
}
.chat-item-content {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.chat-item-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}
.chat-item-title {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
}
.chat-item-favorite {
    color: rgba(255, 215, 0, 0.3);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s;
    padding: 5px;
    border-radius: 8px;
}
.chat-item-favorite:hover {
    color: #ffd700;
    transform: scale(1.2);
    background: rgba(255, 215, 0, 0.1);
}
.chat-item-favorite.active {
    color: #ffd700;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
}
.chat-item-preview {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.6;
}
.chat-item-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
}
.chat-item-date {
    font-size: 12px;
    color: rgba(255, 215, 0, 0.6);
    font-weight: 500;
}
.chat-item-delete {
    background: none;
    border: none;
    color: rgba(255, 80, 80, 0.5);
    cursor: pointer;
    font-size: 15px;
    padding: 6px;
    transition: all 0.3s;
    border-radius: 8px;
}
.chat-item-delete:hover {
    color: #ff5050;
    transform: scale(1.15);
    background: rgba(255, 80, 80, 0.1);
}
.empty-state {
    text-align: center;
    padding: 50px 20px;
    color: rgba(255, 255, 255, 0.4);
}
.empty-state i {
    font-size: 60px;
    margin-bottom: 20px;
    color: rgba(255, 215, 0, 0.3);
    animation: float 3s ease-in-out infinite;
}
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}
.header {
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, rgba(10, 15, 32, 0.9) 0%, rgba(10, 15, 32, 0.6) 100%);
    border-bottom: 1px solid rgba(255, 215, 0, 0.15);
    z-index: 100;
    backdrop-filter: blur(10px);
}
.logo h1 {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #ffd700 0%, #ffaa33 50%, #ffd700 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    animation: shimmer 3s linear infinite;
}
@keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}
.menu-btn {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 215, 0, 0.05) 100%);
    border: 1px solid rgba(255, 215, 0, 0.3);
    color: #ffd700;
    width: 50px;
    height: 50px;
    border-radius: 15px;
    cursor: pointer;
    font-size: 22px;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.1);
}
.menu-btn:hover {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.25) 0%, rgba(255, 215, 0, 0.1) 100%);
    transform: scale(1.08);
    box-shadow: 0 6px 25px rgba(255, 215, 0, 0.2);
}
.chat-wrapper {
    flex: 1;
    position: relative;
    min-height: 0;
    padding: 20px 30px;
}
.chat-container {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 25px 15px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    scroll-behavior: smooth;
}
.message-group {
    display: flex;
    flex-direction: column;
    width: 100%;
    align-items: flex-start;
    margin-bottom: 15px;
    animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes slideIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
.user-message {
    max-width: 75%;
    padding: 18px 28px;
    border-radius: 28px 28px 28px 10px;
    font-size: 18px;
    line-height: 1.8;
    box-shadow: 0 8px 25px rgba(255, 215, 0, 0.15);
    word-wrap: break-word;
    background: linear-gradient(135deg, #ffd700 0%, #ffaa33 100%);
    color: #0a0f20;
    font-weight: 600;
    margin-bottom: 10px;
    text-align: right;
    align-self: flex-start;
    position: relative;
    overflow: hidden;
}
.user-message::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transform: rotate(45deg);
    animation: shine 3s infinite;
}
@keyframes shine {
    0% { transform: translateX(-100%) rotate(45deg); }
    100% { transform: translateX(100%) rotate(45deg); }
}
.bot-message {
    max-width: 80%;
    padding: 22px 30px;
    border-radius: 28px 28px 28px 10px;
    font-size: 18px;
    line-height: 1.8;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    word-wrap: break-word;
    background: linear-gradient(135deg, rgba(30, 40, 60, 0.95) 0%, rgba(20, 30, 50, 0.95) 100%);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 215, 0, 0.3);
    text-align: right;
    align-self: flex-start;
    position: relative;
}
.bot-message::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #ffd700, #ffaa33, #ffd700);
    border-radius: 28px 28px 0 0;
}
.typing-indicator {
    display: flex;
    gap: 8px;
    padding: 20px 28px;
    background: linear-gradient(135deg, rgba(30, 40, 60, 0.95) 0%, rgba(20, 30, 50, 0.95) 100%);
    border-radius: 28px 28px 28px 10px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    width: fit-content;
}
.typing-indicator span {
    width: 12px;
    height: 12px;
    background: linear-gradient(135deg, #ffd700, #ffaa33);
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-15px); opacity: 1; }
}
.input-wrapper {
    width: 100%;
    padding: 20px 30px 25px;
    background: transparent;
    position: relative;
}
.input-content {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
}
.hints {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
}
.hint {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
    border: 1px dashed rgba(255, 215, 0, 0.3);
    color: rgba(255, 255, 255, 0.75);
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
    font-weight: 500;
    backdrop-filter: blur(5px);
}
.hint:hover:not(.disabled-hint) {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.1) 100%);
    border-color: #ffd700;
    color: #ffd700;
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 25px rgba(255, 215, 0, 0.2);
}
.hint.disabled-hint {
    opacity: 0.3;
    cursor: not-allowed;
    filter: grayscale(1);
}
.input-row {
    display: flex;
    align-items: center;
    gap: 15px;
    width: 100%;
    position: relative;
}
.dream-input-container {
    position: relative;
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
}
.dream-input {
    width: 100%;
    padding: 20px 25px;
    padding-left: 75px;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.3) 100%);
    border: 2px solid rgba(255, 215, 0, 0.25);
    border-radius: 40px;
    color: #fff;
    font-size: 18px;
    font-family: 'Cairo', sans-serif;
    resize: none;
    min-height: 70px;
    max-height: 350px;
    transition: all 0.4s ease;
    overflow-y: hidden;
    line-height: 1.6;
    display: block;
    backdrop-filter: blur(10px);
}
.dream-input:focus {
    outline: none;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.4) 100%);
    border-color: rgba(255, 215, 0, 0.6);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.2), inset 0 0 20px rgba(255, 215, 0, 0.05);
    transform: translateY(-2px);
}
.dream-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
}
.send-btn {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    min-width: 48px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #ffd700 0%, #ffaa33 100%);
    color: #0a0f20;
    box-shadow: 0 6px 25px rgba(255, 215, 0, 0.35);
    transition: all 0.3s;
    padding: 0;
}
.send-btn:hover:not(:disabled) {
    box-shadow: 0 8px 35px rgba(255, 215, 0, 0.5);
    transform: translateY(-50%) scale(1.08);
}
.send-btn:active:not(:disabled) {
    transform: translateY(-50%) scale(0.95);
}
.send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    filter: grayscale(1);
}
.send-btn i {
    font-size: 20px;
}
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 15, 32, 0.97);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(15px);
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
.modal-content {
    background: linear-gradient(135deg, rgba(15, 20, 35, 0.98) 0%, rgba(10, 15, 30, 0.98) 100%);
    border: 2px solid rgba(255, 215, 0, 0.6);
    border-radius: 30px;
    padding: 45px 35px;
    width: 95%;
    max-width: 450px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.1);
    position: relative;
    animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes slideUp {
    from { opacity: 0; transform: translateY(50px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-content::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: linear-gradient(135deg, #ffd700, #ffaa33, #ffd700);
    border-radius: 32px;
    z-index: -1;
    opacity: 0.3;
    filter: blur(20px);
}
.modal-content h2 {
    color: #ffd700;
    font-size: 28px;
    margin-bottom: 30px;
    font-weight: 800;
    text-align: center;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
}
.profile-view-info {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
    padding: 30px;
    border-radius: 22px;
    margin-bottom: 35px;
    text-align: right;
    border: 1px solid rgba(255, 215, 0, 0.2);
}
.profile-view-info p {
    font-size: 19px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    line-height: 1.6;
}
.profile-view-info p:last-child {
    margin-bottom: 0;
}
.profile-view-info i {
    color: #ffd700;
    width: 32px;
    font-size: 22px;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
}
.modal-label {
    text-align: right;
    display: block;
    margin-bottom: 10px;
    color: rgba(255, 255, 255, 0.9);
    font-size: 17px;
    font-weight: 600;
}
.modal-input {
    width: 100%;
    padding: 18px 24px;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.4) 100%);
    border: 2px solid rgba(255, 215, 0, 0.3);
    border-radius: 35px;
    color: #fff;
    font-size: 18px;
    font-family: 'Cairo', sans-serif;
    margin-bottom: 25px;
    transition: all 0.3s;
    backdrop-filter: blur(5px);
}
.modal-input:focus {
    outline: none;
    border-color: #ffd700;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.5) 100%);
    transform: translateY(-2px);
}
.dob-container {
    display: flex;
    gap: 15px;
    margin-bottom: 35px;
}
.dob-container .modal-input {
    margin-bottom: 0;
    flex: 1;
    padding: 18px 15px;
    text-align: center;
}
.modal-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #ffd700 0%, #ffaa33 100%);
    color: #0a0f20;
    border: none;
    border-radius: 35px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 12px;
    font-family: 'Cairo', sans-serif;
    box-shadow: 0 8px 30px rgba(255, 215, 0, 0.3);
    position: relative;
    overflow: hidden;
}
.modal-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    transition: left 0.5s;
}
.modal-btn:hover::before {
    left: 100%;
}
.modal-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5);
}
.modal-btn:active {
    transform: translateY(-2px);
}
.modal-btn.red {
    background: linear-gradient(135deg, #ff5050 0%, #cc0000 100%);
    color: #fff;
    box-shadow: 0 8px 30px rgba(255, 80, 80, 0.3);
}
.modal-btn.red:hover {
    box-shadow: 0 15px 40px rgba(255, 80, 80, 0.5);
}
.modal-btn.back {
    background: transparent;
    border: 2px solid #ffd700;
    color: #ffd700;
    box-shadow: none;
}
.modal-btn.back:hover {
    background: rgba(255, 215, 0, 0.1);
    box-shadow: 0 8px 25px rgba(255, 215, 0, 0.2);
}
.modal-btn-group {
    display: flex;
    gap: 15px;
}
@media (max-width: 768px) {
    .sidebar { width: 100%; }
    .modal-content { padding: 35px 25px; }
    .input-row { flex-direction: column; }
    .dream-input { min-height: 65px; padding: 18px 25px; padding-left: 65px; }
    .send-btn { left: 14px; width: 45px; height: 45px; min-width: 45px; }
    .hints { justify-content: center; }

}
@media (max-width: 480px) {
    .header { padding: 12px 15px; }

    .modal-btn-group { flex-direction: column; }
    .dob-container { flex-direction: column; gap: 10px; }
}

</head>
<body>
<div class="main-container">
<aside class="sidebar" id="sidebar">
<div class="sidebar-header">
<h2><i class="fas fa-comments"></i> المحادثات</h2>
<button class="close-sidebar" onclick="toggleSidebar()">

</div>
<div class="sidebar-actions">

<i class="fas fa-user-circle"></i> الملف الشخصي
</button>
<button class="sidebar-btn btn-new" onclick="newChat()">

</button>
<button class="sidebar-btn btn-delete-all" onclick="deleteAllChats()">
<i class="fas fa-trash"></i> حذف الكل

<i class="fas fa-inbox"></i>
<p>لا توجد محادثات بعد</p>
</div>
</div>
</aside>
<main class="main-content">
<header class="header">
<button class="menu-btn" onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>
<div class="logo">
<h1><i class="fas fa-moon"></i> مفسر الأحلام</h1>
</div>
<div style="width: 50px;"></div>
</header>
<div class="chat-wrapper">
<div class="chat-container" id="chatContainer">
<div class="message-group">
<div class="bot-message">
👋 مرحباً! اكتب حلمك وسأقوم بتفسيره لك
</div>
</div>
</div>
</div>
<div class="input-wrapper">
<div class="input-content">
<div class="hints">
<span class="hint" onclick="useHint('رأيت ثعباناً كبيراً')">🐍 ثعبان</span>
<span class="hint" onclick="useHint('كنت أطير في السماء')">🕊️ طيران</span>
<span class="hint" onclick="useHint('وجدت ذهباً')">💰 ذهب</span>
<span class="hint" onclick="useHint('كنت أسبح في البحر')">🌊 بحر</span>
<span class="hint" onclick="useHint('رأيت أسداً')">🦁 أسد</span>
</div>
<div class="input-row">
<div class="dream-input-container">
<textarea id="dreamInput" class="dream-input" placeholder="اكتب حلمك هنا بالتفصيل..." rows="1"></textarea>
<button class="send-btn" id="sendBtn">
<i class="fas fa-arrow-up"></i>
</button>
</div>
</div>
</div>
</div>
</main>
</div>
<div id="profileModal" class="modal">
<div class="modal-content">
<div id="profileView">
<h2>الملف الشخصي</h2>
<div class="profile-view-info">
<p><i class="fas fa-user"></i> <strong>الاسم:</strong> <span id="displayName"></span></p>
<p><i class="fas fa-calendar"></i> <strong>تاريخ الميلاد:</strong> <span id="displayBirth"></span></p>
</div>
<div class="modal-btn-group">
<button onclick="switchToEditMode()" class="modal-btn">تعديل البيانات <i class="fas fa-edit"></i></button>
<button onclick="performLogout()" class="modal-btn red">تسجيل خروج <i class="fas fa-sign-out-alt"></i></button>
</div>
<button onclick="closeProfileModal()" class="modal-btn back" style="margin-top: 20px;">
<i class="fas fa-arrow-left"></i> رجوع إلى المحادثات
</button>
</div>
<div id="profileEdit" style="display: none;">
<h2 id="modalTitleEdit">تعديل البيانات</h2>
<label class="modal-label">اسمك الكامل</label>
<input type="text" id="userName" class="modal-input" placeholder="اكتب اسمك هنا...">
<label class="modal-label">تاريخ الميلاد</label>
<div class="dob-container">
<select id="birthDay" class="modal-input"><option value="">اليوم</option></select>
<select id="birthMonth" class="modal-input"><option value="">الشهر</option></select>
<select id="birthYear" class="modal-input"><option value="">السنة</option></select>
</div>
<button onclick="saveProfile()" class="modal-btn">حفظ التغييرات</button>
<button onclick="closeProfileModal()" class="modal-btn" style="background: transparent; border: 2px solid #ffd700; color: #ffd700; margin-top: 10px;">إلغاء</button>
</div>
</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
const firebaseConfig = {

authDomain: "tafser-3dee3.firebaseapp.com",
projectId: "tafser-3dee3",
storageBucket: "tafser-3dee3.firebasestorage.app",
messagingSenderId: "137616687433",
appId: "1:137616687433:web:e9d881376e10cb843e1a98",
measurementId: "G-4810DWPK3J"
};
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
</script>
<script>
const dreamInput = document.getElementById('dreamInput');
const chatContainer = document.getElementById('chatContainer');
const sendBtn = document.getElementById('sendBtn');
const hints = document.querySelectorAll('.hint');
const sidebar = document.getElementById('sidebar');
const chatList = document.getElementById('chatList');
let isGenerating = false;
let currentChatId = null;
let chats = JSON.parse(localStorage.getItem('dreamChats')) || [];
let favorites = JSON.parse(localStorage.getItem('dreamFavorites')) || [];
let userProfile = JSON.parse(localStorage.getItem('userProfile')) || null;
const WEBHOOK_URL = 'https://kalmeron.app.n8n.cloud/webhook/dreem';

function autoResizeTextarea() {
    dreamInput.style.height = 'auto';
    const newHeight = Math.min(dreamInput.scrollHeight, 350);
    dreamInput.style.height = newHeight + 'px';
    dreamInput.style.overflowY = dreamInput.scrollHeight > 350 ? 'auto' : 'hidden';
}
dreamInput.addEventListener('input', autoResizeTextarea);

function saveData() {
    localStorage.setItem('dreamChats', JSON.stringify(chats));
    localStorage.setItem('dreamFavorites', JSON.stringify(favorites));
    if (userProfile) localStorage.setItem('userProfile', JSON.stringify(userProfile));
}

function toggleSidebar() {
    sidebar.classList.toggle('open');
    if (sidebar.classList.contains('open')) renderChatList();
}

function renderChatList() {
    if (chats.length === 0) {
        chatList.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد محادثات</p></div>`;
        return;
    }
    chatList.innerHTML = chats.map(chat => `
        <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat('${chat.id}')">
            <div class="chat-item-content">
                <div class="chat-item-header">
                    <div class="chat-item-title">${chat.title || 'محادثة جديدة'}</div>
                    <i class="fas fa-star chat-item-favorite ${favorites.includes(chat.id) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${chat.id}')"></i>
                </div>
                <div class="chat-item-preview">${chat.messages[0]?.text || 'لا توجد رسائل'}</div>
                <div class="chat-item-footer">
                    <div class="chat-item-date">${new Date(chat.date).toLocaleDateString('ar-EG')}</div>
                    <button class="chat-item-delete" onclick="event.stopPropagation(); deleteChat('${chat.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>
    `).join('');
}

function getWelcomeMessage() {
    const namePart = userProfile && userProfile.name ? ` ${userProfile.name}` : '';
    return `👋 مرحباً${namePart}! اكتب حلمك وسأقوم بتفسيره لك`;
}

function updateWelcomeInCurrentChat() {
    const firstBot = chatContainer.querySelector('.bot-message');
    if (firstBot) firstBot.textContent = getWelcomeMessage();
}

function newChat() {
    const chatId = 'chat-' + Date.now();
    chats.unshift({ id: chatId, title: 'محادثة جديدة', messages: [], date: new Date().toISOString() });
    currentChatId = chatId;
    saveData();
    chatContainer.innerHTML = `<div class="message-group"><div class="bot-message">${getWelcomeMessage()}</div></div>`;
    renderChatList();
    if (window.innerWidth <= 768) toggleSidebar();
}

function loadChat(chatId) {
    currentChatId = chatId;
    const chat = chats.find(c => c.id === chatId);
    if (!chat) return;
    if (chat.messages.length === 0) {
        chatContainer.innerHTML = `<div class="message-group"><div class="bot-message">${getWelcomeMessage()}</div></div>`;
    } else {
        chatContainer.innerHTML = chat.messages.map(msg => `
            <div class="message-group">
                <div class="${msg.type === 'user' ? 'user-message' : 'bot-message'}">${msg.text}</div>
            </div>
        `).join('');
    }
    scrollToBottom(false);
    renderChatList();
    if (window.innerWidth <= 768) toggleSidebar();
}

function toggleFavorite(chatId) {
    const index = favorites.indexOf(chatId);
    if (index > -1) favorites.splice(index, 1);
    else favorites.push(chatId);
    saveData();
    renderChatList();
}

function deleteChat(chatId) {
    if (!confirm('هل أنت متأكد من حذف هذه المحادثة؟')) return;
    chats = chats.filter(c => c.id !== chatId);
    favorites = favorites.filter(f => f !== chatId);
    if (currentChatId === chatId) {
        currentChatId = null;
        chatContainer.innerHTML = `<div class="message-group"><div class="bot-message">${getWelcomeMessage()}</div></div>`;
    }
    saveData();
    renderChatList();
}

function deleteAllChats() {
    if (!confirm('هل أنت متأكد من حذف جميع المحادثات؟')) return;
    chats = [];
    favorites = [];
    currentChatId = null;
    saveData();
    chatContainer.innerHTML = `<div class="message-group"><div class="bot-message">${getWelcomeMessage()}</div></div>`;
    renderChatList();
}

function scrollToBottom(smooth = true) {
    setTimeout(() => {
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
    }, 10);
}

function useHint(text) {
    if (isGenerating) return;
    dreamInput.value = text;
    autoResizeTextarea();
    dreamInput.focus();
}

function updateUIState(generating) {
    isGenerating = generating;
    sendBtn.disabled = generating;
    hints.forEach(h => h.classList.toggle('disabled-hint', generating));
    sendBtn.innerHTML = generating ? '<i class="fas fa-spinner fa-spin"></i>' : '<i class="fas fa-arrow-up"></i>';
}

function addMessageGroup(userText) {
    const group = document.createElement('div');
    group.className = 'message-group';
    const userDiv = document.createElement('div');
    userDiv.className = 'user-message';
    userDiv.textContent = userText;
    const botDiv = document.createElement('div');
    botDiv.className = 'bot-message';
    group.append(userDiv, botDiv);
    chatContainer.appendChild(group);
    return botDiv;
}

function showTypingIndicator() {
    const ind = document.createElement('div');
    ind.className = 'message-group';
    ind.id = 'typingIndicator';
    ind.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    chatContainer.appendChild(ind);
    scrollToBottom(true);
}

function hideTypingIndicator() {
    const ind = document.getElementById('typingIndicator');
    if (ind) ind.remove();
}

async function typeMessage(element, text, speed = 15) {
    element.innerHTML = '';
    for (let i = 0; i < text.length; i++) {
        element.innerHTML += text[i];
        if (i % 3 === 0) scrollToBottom(true);
        await new Promise(r => setTimeout(r, speed));
    }
    scrollToBottom(true);
}

async function processMessage(messageText) {
    showTypingIndicator();
    try {
        const response = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                dream: messageText,
                userName: userProfile?.name || 'زائر',
                birthDate: userProfile?.birthDate || 'غير محدد'
            })
        });
        const responseText = await response.text();
        console.log('الرد الخام:', responseText);
        hideTypingIndicator();
        if (!response.ok) {
            throw new Error(`فشل الطلب: ${response.status} - ${responseText}`);
        }
        if (!responseText || responseText.trim() === '') {
            const defaultMessage = 'تم استلام حلمك بنجاح ✅ سيقوم المفسر بالرد قريباً.';
            const botElement = addMessageGroup(messageText);
            await typeMessage(botElement, defaultMessage, 15);
            if (!currentChatId) {
                currentChatId = 'chat-' + Date.now();
                chats.unshift({ id: currentChatId, title: messageText.substring(0, 30) + '...', messages: [], date: new Date().toISOString() });
            }
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) {
                chat.messages.push({ type: 'user', text: messageText });
                chat.messages.push({ type: 'bot', text: defaultMessage });
                if (!chat.title || chat.title === 'محادثة جديدة') chat.title = messageText.substring(0, 30) + '...';
                saveData();
            }
            return;
        }
        let interpretation = responseText;
        if (responseText.trim().startsWith('{') || responseText.trim().startsWith('[')) {
            try {
                const data = JSON.parse(responseText);
                interpretation = data.interpretation || data.message || data.text || data.reply || data.response || JSON.stringify(data);
            } catch (e) {
                console.log('النص مش JSON صحيح');
            }
        }
        const botElement = addMessageGroup(messageText);
        await typeMessage(botElement, interpretation, 15);
        if (!currentChatId) {
            currentChatId = 'chat-' + Date.now();
            chats.unshift({ id: currentChatId, title: messageText.substring(0, 30) + '...', messages: [], date: new Date().toISOString() });
        }
        const chat = chats.find(c => c.id === currentChatId);
        if (chat) {
            chat.messages.push({ type: 'user', text: messageText });
            chat.messages.push({ type: 'bot', text: interpretation });
            if (!chat.title || chat.title === 'محادثة جديدة') chat.title = messageText.substring(0, 30) + '...';
            saveData();
        }
    } catch (error) {
        hideTypingIndicator();
        console.error('خطأ:', error);
        let errorMessage = '❌ عذراً، حدث خطأ في الاتصال.\n🔍 التفاصيل: ' + error.message;
        const botElement = addMessageGroup(messageText);
        await typeMessage(botElement, errorMessage, 15);
    }
}

async function handleSend() {
    if (isGenerating) return;
    const dreamText = dreamInput.value.trim();
    if (!dreamText) return alert('اكتب حلمك أولاً');
    updateUIState(true);
    dreamInput.value = '';
    autoResizeTextarea();
    await processMessage(dreamText);
    updateUIState(false);
    dreamInput.focus();
    renderChatList();
}

function populateDOBSelects() {
    const daySel = document.getElementById('birthDay');
    const monthSel = document.getElementById('birthMonth');
    const yearSel = document.getElementById('birthYear');
    daySel.innerHTML = '<option value="">اليوم</option>';
    for (let d = 1; d <= 31; d++) {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        daySel.appendChild(opt);
    }
    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    monthSel.innerHTML = '<option value="">الشهر</option>';
    for (let m = 0; m < 12; m++) {
        const opt = document.createElement('option');
        opt.value = m + 1; opt.textContent = months[m];
        monthSel.appendChild(opt);
    }
    const currentYear = new Date().getFullYear();
    yearSel.innerHTML = '<option value="">السنة</option>';
    for (let y = currentYear; y >= 1940; y--) {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = y;
        yearSel.appendChild(opt);
    }
}

function openProfile() {
    const modal = document.getElementById('profileModal');
    if (!userProfile) {
        document.getElementById('profileView').style.display = 'none';
        document.getElementById('profileEdit').style.display = 'block';
        document.getElementById('modalTitleEdit').textContent = 'مرحباً! سجل بياناتك للبدء';
        document.getElementById('userName').value = '';
        document.getElementById('birthDay').value = '';
        document.getElementById('birthMonth').value = '';
        document.getElementById('birthYear').value = '';
    } else {
        document.getElementById('profileView').style.display = 'block';
        document.getElementById('profileEdit').style.display = 'none';
        document.getElementById('displayName').textContent = userProfile.name;
        document.getElementById('displayBirth').textContent = userProfile.birthDate;
    }
    modal.style.display = 'flex';
}

function switchToEditMode() {
    document.getElementById('profileView').style.display = 'none';
    document.getElementById('profileEdit').style.display = 'block';
    document.getElementById('modalTitleEdit').textContent = 'تعديل البيانات';
    if (userProfile) {
        document.getElementById('userName').value = userProfile.name || '';
        if (userProfile.birthDate) {
            const [d, m, y] = userProfile.birthDate.split('/');
            document.getElementById('birthDay').value = d || '';
            document.getElementById('birthMonth').value = m || '';
            document.getElementById('birthYear').value = y || '';
        }
    }
}

function saveProfile() {
    const name = document.getElementById('userName').value.trim();
    const day = document.getElementById('birthDay').value;
    const month = document.getElementById('birthMonth').value;
    const year = document.getElementById('birthYear').value;
    if (!name) return alert('يرجى إدخال اسمك الكامل');
    if (!day || !month || !year) return alert('يرجى اختيار تاريخ الميلاد كاملاً');
    userProfile = { name, birthDate: `${day}/${month}/${year}` };
    localStorage.setItem('userProfile', JSON.stringify(userProfile));
    saveData();
    document.getElementById('profileModal').style.display = 'none';
    updateWelcomeInCurrentChat();
    alert('✅ تم حفظ بياناتك بنجاح!');
}

function performLogout() {
    if (!confirm('هل أنت متأكد من تسجيل الخروج؟ سيتم حذف بياناتك وسيطلب منك التسجيل مرة أخرى.')) return;
    localStorage.removeItem('userProfile');
    userProfile = null;
    document.getElementById('profileModal').style.display = 'none';
    updateWelcomeInCurrentChat();
    setTimeout(() => {
        const modal = document.getElementById('profileModal');
        document.getElementById('profileView').style.display = 'none';
        document.getElementById('profileEdit').style.display = 'block';
        document.getElementById('modalTitleEdit').textContent = 'مرحباً! سجل بياناتك للبدء';
        document.getElementById('userName').value = '';
        document.getElementById('birthDay').value = '';
        document.getElementById('birthMonth').value = '';
        document.getElementById('birthYear').value = '';
        modal.style.display = 'flex';
    }, 400);
}

function closeProfileModal() {
    document.getElementById('profileModal').style.display = 'none';
}

sendBtn.addEventListener('click', handleSend);
dreamInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
    }
});

populateDOBSelects();
if (chats.length === 0) newChat();
window.addEventListener('load', () => {
    autoResizeTextarea();
    scrollToBottom(false);
    renderChatList();
    if (userProfile) {
        updateWelcomeInCurrentChat();
    } else {
        const modal = document.getElementById('profileModal');
        document.getElementById('profileView').style.display = 'none';
        document.getElementById('profileEdit').style.display = 'block';
        document.getElementById('modalTitleEdit').textContent = 'مرحباً! سجل بياناتك للبدء';
        modal.style.display = 'flex';
    }
});
</script>
</body>
</html>
